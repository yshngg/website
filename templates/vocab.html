{% extends "base.html" %}

{% block title %}Vocabulary - {{ config.title }}{% endblock %}

{% block content %}
<div id="vocab-app">
  <h1>Vocabulary</h1>
  <div class="vocab-toolbar">
    <div class="hstack">
      <a href="/vocab/flashcard/">Flashcards →</a>
      <button class="pos-btn" id="vocab-export">Export ↓</button>
    </div>
    <input type="text" id="vocab-search" placeholder="Search words, definitions, translations..." />
  </div>

  <div class="vocab-pagination" id="browse-pagination-top"></div>
  <div id="vocab-list"></div>
  <div class="vocab-pagination" id="browse-pagination-bottom"></div>
</div>

<script src="/vocab.js"></script>
<link href="/vocab.css" rel="stylesheet" />
{% endblock %}
